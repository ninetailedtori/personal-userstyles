include = [ "**/*.toml" ]
exclude = [
  "**/*nested-1000.toml",
  "**/node_modules/**",
  "**/dist/**",
  "**/.nuxt/**",
  "**/.vite/**",
  "**/.output/**",
  "**/invalid/*",
  "test-data/**",
  "backend/target/**",
]

[formatting]
  align_entries         = true
  align_comments        = true
  array_trailing_comma  = true
  array_auto_expand     = true
  array_auto_collapse   = true
  compact_arrays        = false
  compact_inline_tables = false
  inline_table_expand   = true
  compact_entries       = false
  column_width          = 80
  indent_tables         = true
  indent_entries        = true
  indent_string         = "  "
  trailing_newline      = true
  reorder_keys          = false
  reorder_arrays        = false
  reorder_inline_tables = false
  allowed_blank_lines   = 1
  crlf                  = false

[[rule]]
  include = [ "taplo.toml", ".taplo.toml" ]
  keys    = [ "exclude" ]

  [rule.formatting]
    reorder_keys = true

[[rule]]
  include = [ "**/Cargo.toml" ]

  [rule.formatting]
    column_width = 100
    reorder_keys = true

[[rule]]
  include = [ "**/Cargo.toml" ]
  keys    = [ "package", "**.package" ]

  [rule.formatting]
    reorder_keys = false

[[rule]]
  include = [ ".cargo/config.toml" ]

  [rule.formatting]
    column_width = 120
    reorder_keys = true
